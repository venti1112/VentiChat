<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - VentiChat</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/js/bootstrap.min.js" defer></script>
    <script src="/js/common.js" defer></script>
    <script src="/js/profile.js" defer></script>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success fixed-top text-center" style="display: none;">
        操作成功！
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">VentiChat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">聊天</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">管理后台</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-light" id="logoutBtn"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4><i class="bi bi-person-circle me-2"></i>个人中心</h4>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <!-- 头像区域 -->
                            <div class="text-center mb-4">
                                <div class="avatar-upload">
                                    <img src="/120" alt="头像" id="currentAvatar">
                                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                                    <div class="change-avatar" onclick="document.getElementById('avatarInput').click();">
                                        <i class="bi bi-camera"></i>
                                    </div>
                                </div>
                                <p class="mt-2 text-muted">点击相机图标更换头像</p>
                            </div>

                            <!-- 昵称输入 -->
                            <div class="mb-3">
                                <label for="nickname" class="form-label">昵称</label>
                                <input type="text" class="form-control" id="nickname" name="nickname" required>
                                <div class="form-text">在聊天中显示的名字</div>
                            </div>

                            <!-- 用户名显示 -->
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" disabled>
                                <div class="form-text">用于登录的账号，不可更改</div>
                            </div>

                            <!-- UID显示 -->
                            <div class="mb-3">
                                <label class="form-label">用户ID (UID)</label>
                                <input type="text" class="form-control" id="uid" disabled>
                                <div class="form-text">您的唯一编号</div>
                            </div>

                            <!-- 修改密码 -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0"><i class="bi bi-lock me-2"></i>修改密码</h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="currentPassword" class="form-label">当前密码</label>
                                        <input type="password" class="form-control" id="currentPassword" name="currentPassword">
                                    </div>
                                    <div class="mb-3">
                                        <label for="newPassword" class="form-label">新密码</label>
                                        <input type="password" class="form-control" id="newPassword" name="newPassword">
                                        <div class="form-text">至少6位字符</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">确认新密码</label>
                                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword">
                                    </div>
                                </div>
                            </div>

                            <!-- 提交按钮 -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary" id="resetBtn">重置</button>
                                <button type="submit" class="btn btn-primary">保存更改</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功提示模态框 -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="bi bi-check-circle me-2"></i>成功</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="successMessage">您的信息已成功更新！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误提示模态框 -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>错误</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="errorMessage">发生错误，请重试。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
