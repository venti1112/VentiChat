<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - VentiChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { padding-top: 56px; }
        .profile-container { max-width: 800px; margin: 20px auto; }
        .avatar-upload { position: relative; display: inline-block; }
        .avatar-upload img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        .avatar-upload .change-avatar {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0b93f6;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .form-label { font-weight: bold; }
    </style>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success fixed-top text-center" style="display: none;">
        操作成功！
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">VentiChat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">聊天</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">管理后台</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-light" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container profile-container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4><i class="fas fa-user-circle me-2"></i>个人中心</h4>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <!-- 头像区域 -->
                            <div class="text-center mb-4">
                                <div class="avatar-upload">
                                    <img src="https://via.placeholder.com/120" alt="头像" id="currentAvatar">
                                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                                    <div class="change-avatar" onclick="document.getElementById('avatarInput').click();">
                                        <i class="fas fa-camera"></i>
                                    </div>
                                </div>
                                <p class="mt-2 text-muted">点击相机图标更换头像</p>
                            </div>

                            <!-- 昵称输入 -->
                            <div class="mb-3">
                                <label for="nickname" class="form-label">昵称</label>
                                <input type="text" class="form-control" id="nickname" name="nickname" required>
                                <div class="form-text">在聊天中显示的名字</div>
                            </div>

                            <!-- 用户名显示 -->
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" disabled>
                                <div class="form-text">用于登录的账号，不可更改</div>
                            </div>

                            <!-- UID显示 -->
                            <div class="mb-3">
                                <label class="form-label">用户ID (UID)</label>
                                <input type="text" class="form-control" id="uid" disabled>
                                <div class="form-text">您的唯一编号</div>
                            </div>

                            <!-- 修改密码 -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0"><i class="fas fa-lock me-2"></i>修改密码</h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="currentPassword" class="form-label">当前密码</label>
                                        <input type="password" class="form-control" id="currentPassword" name="currentPassword">
                                    </div>
                                    <div class="mb-3">
                                        <label for="newPassword" class="form-label">新密码</label>
                                        <input type="password" class="form-control" id="newPassword" name="newPassword">
                                        <div class="form-text">至少6位字符</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">确认新密码</label>
                                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword">
                                    </div>
                                </div>
                            </div>

                            <!-- 提交按钮 -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary" id="resetBtn">重置</button>
                                <button type="submit" class="btn btn-primary">保存更改</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功提示模态框 -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-check-circle me-2"></i>成功</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="successMessage">您的信息已成功更新！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误提示模态框 -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>错误</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="errorMessage">发生错误，请重试。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 主要应用脚本 -->
    <script>
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const currentUser = localStorage.getItem('currentUser');
            
            if (!token || !currentUser) {
                window.location.href = '/login.html';
                return false;
            }
            
            try {
                // 验证token有效性（简单检查）
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('currentUser');
                    window.location.href = '/login.html';
                    return false;
                }
                
                return true;
            } catch (e) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                window.location.href = '/login.html';
                return false;
            }
        }
        
        // 全局变量
        let currentUserId = null;
        let currentUserData = null;
        
        // DOM元素引用
        const profileForm = document.getElementById('profileForm');
        const avatarInput = document.getElementById('avatarInput');
        const currentAvatar = document.getElementById('currentAvatar');
        
        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            // 从localStorage获取当前用户信息
            currentUserData = JSON.parse(localStorage.getItem('currentUser'));
            currentUserId = currentUserData.id;
            
            loadUserProfile();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 表单提交
            profileForm.addEventListener('submit', updateProfile);
            
            // 重置按钮
            document.getElementById('resetBtn').addEventListener('click', resetForm);
            
            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // 头像上传
            avatarInput.addEventListener('change', handleAvatarUpload);
            
            // 密码验证
            document.getElementById('confirmPassword').addEventListener('blur', validatePasswords);
            document.getElementById('newPassword').addEventListener('blur', validatePasswords);
        }

        // 加载用户信息
        async function loadUserProfile() {
            // 从localStorage获取用户信息
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    currentUserData = userData;
                    
                    // 填充表单
                    document.getElementById('username').value = userData.username;
                    document.getElementById('nickname').value = userData.nickname || userData.username;
                    document.getElementById('uid').value = userData.id;
                    if (userData.avatarUrl) {
                        currentAvatar.src = userData.avatarUrl;
                    }
                    return;
                } catch (e) {
                    console.error('解析用户信息失败:', e);
                }
            }
            
            // 如果没有本地数据，使用默认值
            const defaultUser = {
                id: '1001',
                username: 'user_' + Date.now(),
                nickname: '新用户',
                avatarUrl: 'https://via.placeholder.com/120'
            };
            
            // 填充表单
            document.getElementById('username').value = defaultUser.username;
            document.getElementById('nickname').value = defaultUser.nickname;
            document.getElementById('uid').value = defaultUser.id;
            if (defaultUser.avatarUrl) {
                currentAvatar.src = defaultUser.avatarUrl;
            }
        }

        // 加载个人资料
        function loadProfileData() {
            fetch('/api/users/profile')
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(user => {
                    document.getElementById('currentAvatar').src = user.avatarUrl;
                    document.getElementById('avatarPreview').src = user.avatarUrl;
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('nickname').value = user.nickname || '';
                    document.getElementById('bio').value = user.bio || '';
                    document.getElementById('registrationDate').textContent = formatDateTime(user.createdAt);
                    
                    // 设置用户ID到表单
                    const forms = document.querySelectorAll('form');
                    forms.forEach(form => {
                        form.dataset.userId = user.id;
                    });
                })
                .catch(error => {
                    console.error('加载个人资料失败:', error);
                    showError('加载资料失败：' + error.message);
                });
        }

        // 更新个人资料
        async function updateProfile(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = {
                nickname: formData.get('nickname'),
                bio: formData.get('bio')
            };
            
            try {
                const response = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '更新失败');
                }
                
                showSuccess('资料更新成功！');
                
                // 刷新页面数据
                loadProfileData();
                
            } catch (error) {
                showError('更新失败：' + error.message);
            }
        }

        // 处理头像上传
        async function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.match('image.*')) {
                showError('请选择图片文件');
                avatarInput.value = '';
                return;
            }
            
            // 验证文件大小（限制5MB）
            if (file.size > 5 * 1024 * 1024) {
                showError('图片大小不能超过5MB');
                avatarInput.value = '';
                return;
            }
            
            // 预览新头像
            const reader = new FileReader();
            reader.onload = function(e) {
                currentAvatar.src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            // 上传到服务器
            const formData = new FormData();
            formData.append('avatar', file);
            
            try {
                const response = await fetch('/api/users/avatar', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '上传失败');
                }
                
                const result = await response.json();
                showSuccess('头像更新成功！');
                
                // 更新页面显示
                currentAvatar.src = result.avatarUrl;
                
            } catch (error) {
                showError('头像上传失败：' + error.message);
                // 如果上传失败，恢复原来的头像
                loadUserProfile();
            }
        }

        // 验证密码
        function validatePasswords() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword && confirmPassword && newPassword !== confirmPassword) {
                document.getElementById('confirmPassword').setCustomValidity('密码不匹配');
            } else {
                document.getElementById('confirmPassword').setCustomValidity('');
            }
        }

        // 重置表单
        function resetForm() {
            // 重新加载用户信息
            loadUserProfile();
            
            // 清空密码字段
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            // 清空头像输入
            avatarInput.value = '';
        }

        // 显示成功消息
        function showSuccess(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-success fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        // 显示错误消息
        function showError(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-danger fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // 修改密码
        async function changePassword(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const oldPassword = formData.get('oldPassword');
            const newPassword = formData.get('newPassword');
            const confirmPassword = formData.get('confirmPassword');
            
            // 验证输入
            if (!oldPassword || !newPassword || !confirmPassword) {
                showError('请填写所有字段');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('新密码至少需要6位字符');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('两次输入的新密码不一致');
                return;
            }
            
            try {
                const response = await fetch('/api/users/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '修改失败');
                }
                
                showSuccess('密码修改成功！');
                
                // 重置表单
                e.target.reset();
                
            } catch (error) {
                showError('密码修改失败：' + error.message);
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 这里应该清除会话并重定向到登录页
                console.log('用户退出登录');
                // 实际实现中需要调用API
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
