<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentiChat 聊天系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { padding-top: 56px; }
        
        /* 聊天界面样式 */
        .chat-container { height: calc(100vh - 120px); }
        .room-list { height: calc(100vh - 120px); overflow-y: auto; }
        .chat-messages { height: calc(100vh - 200px); overflow-y: auto; }
        
        /* 消息气泡样式 */
        .message { margin-bottom: 15px; }
        .message-left { display: flex; align-items: flex-start; margin-right: 60px; }
        .message-right { display: flex; flex-direction: row-reverse; align-items: flex-start; margin-left: 60px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .message-content { max-width: 70%; }
        .message-bubble { 
            padding: 10px 15px; 
            border-radius: 18px; 
            margin: 5px 0;
        }
        .message-text { 
            background-color: #f1f0f0; 
            color: #000; 
        }
        .message-image, .message-video, .message-file {
            max-width: 200px;
            border-radius: 10px;
        }
        .message-file {
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 10px;
        }
        .message-time { font-size: 0.7em; color: #999; text-align: center; margin: 5px 0; }
        
        /* 当前用户消息样式 */
        .current-user .message-bubble { 
            background-color: #0b93f6; 
            color: white; 
        }
        
        /* 输入区域 */
        .input-area { height: 60px; }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .room-list { height: 100px; }
            .chat-container { height: calc(100vh - 180px); }
            .chat-messages { height: calc(100vh - 260px); }
        }
    </style>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success fixed-top text-center" style="display: none;">
        操作成功！
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">VentiChat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">聊天</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">管理后台</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-outline-light me-2" id="createRoomBtn">创建聊天室</button>
                    <button class="btn btn-light" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 聊天室列表 -->
            <div class="col-md-3 col-lg-2">
                <div class="card room-list">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">聊天室</h5>
                        <button class="btn btn-sm btn-primary" id="searchRoomBtn"><i class="fas fa-search"></i></button>
                    </div>
                    <ul class="list-group list-group-flush" id="roomList">
                        <!-- 聊天室列表项将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>

            <!-- 聊天主界面 -->
            <div class="col-md-9 col-lg-10">
                <div class="card chat-container">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" id="currentRoomName">请选择聊天室</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary me-2" id="membersBtn"><i class="fas fa-users"></i> 成员</button>
                            <button class="btn btn-sm btn-outline-secondary" id="settingsBtn"><i class="fas fa-cog"></i></button>
                        </div>
                    </div>
                    
                    <!-- 消息显示区域 -->
                    <div class="card-body chat-messages" id="chatMessages">
                        <div class="text-center text-muted my-3">
                            <p>选择一个聊天室开始聊天</p>
                        </div>
                    </div>
                    
                    <!-- 输入区域 -->
                    <div class="card-footer input-area">
                        <div class="input-group">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">文件</button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" id="sendImageBtn"><i class="fas fa-image me-2"></i>发送图片</a></li>
                                <li><a class="dropdown-item" href="#" id="sendVideoBtn"><i class="fas fa-video me-2"></i>发送视频</a></li>
                                <li><a class="dropdown-item" href="#" id="sendFileBtn"><i class="fas fa-file me-2"></i>发送文件</a></li>
                            </ul>
                            <input type="text" class="form-control" placeholder="输入消息..." id="messageInput">
                            <button class="btn btn-primary" id="sendBtn">发送</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建聊天室模态框 -->
    <div class="modal fade" id="createRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建聊天室</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createRoomForm">
                        <div class="mb-3">
                            <label class="form-label">聊天室名称</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="requireApproval" checked>
                            <label class="form-check-label">加入需要审核</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">媒体权限</label>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="allowImages" checked>
                                <label class="form-check-label">允许发送图片</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="allowVideos" checked>
                                <label class="form-check-label">允许发送视频</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="allowFiles" checked>
                                <label class="form-check-label">允许发送文件</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary" form="createRoomForm">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 成员列表模态框 -->
    <div class="modal fade" id="membersModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">聊天室成员</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group" id="membersList">
                        <!-- 成员列表将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 搜索用户模态框 -->
    <div class="modal fade" id="searchUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">搜索用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="UID/用户名/昵称" id="searchUserInput">
                        <button class="btn btn-primary" id="searchUserBtn">搜索</button>
                    </div>
                    <ul class="list-group" id="searchResults">
                        <!-- 搜索结果将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Socket.IO Client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- 主要应用脚本 -->
    <script>
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const currentUser = localStorage.getItem('currentUser');
            
            if (!token || !currentUser) {
                window.location.href = '/login.html';
                return false;
            }
            
            try {
                // 验证token有效性（简单检查）
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('currentUser');
                    window.location.href = '/login.html';
                    return false;
                }
                
                // 设置当前用户
                currentUserData = JSON.parse(currentUser);
                return true;
            } catch (e) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                window.location.href = '/login.html';
                return false;
            }
        }
        
        // 全局变量
        let currentRoomId = null;
        let currentUserData = null;
        const socket = io();
        
        // DOM元素引用
        const roomList = document.getElementById('roomList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentRoomName = document.getElementById('currentRoomName');
        const chatMessages = document.getElementById('chatMessages');
        
        // 状态变量
        let hasMoreHistory = true;
        let loadingHistory = false;
        
        // 加载状态管理
        function setLoadingHistory(loading) {
            loadingHistory = loading;
            // TODO: 可以在这里添加加载指示器的显示/隐藏逻辑
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            // 从localStorage获取当前用户信息
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            loadRooms();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 发送消息
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            // 创建聊天室表单提交
            document.getElementById('createRoomForm').addEventListener('submit', createRoom);
            
            // 搜索用户
            document.getElementById('searchUserBtn').addEventListener('click', searchUser);
            
            // 文件上传
            document.getElementById('sendImageBtn').addEventListener('click', () => triggerFileUpload('image'));
            document.getElementById('sendVideoBtn').addEventListener('click', () => triggerFileUpload('video'));
            document.getElementById('sendFileBtn').addEventListener('click', () => triggerFileUpload('file'));
            
            // 成员列表按钮
            document.getElementById('membersBtn').addEventListener('click', showMembers);
        }

        // 加载聊天室列表
        function loadRooms() {
            fetch('/api/rooms')
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(rooms => {
                    roomList.innerHTML = '';
                    rooms.forEach(room => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.dataset.roomId = room.id;
                        li.innerHTML = `
                            <div class="room-item">
                                <strong>${room.note || room.name}</strong>
                                ${room.note ? `<small class="text-muted">(${room.name})</small>` : ''}
                            </div>
                            <span class="badge bg-primary rounded-pill">${room.unreadCount || 0}</span>
                        `;
                        li.addEventListener('click', () => joinRoom(room));
                        roomList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('加载聊天室失败:', error);
                    roomList.innerHTML = '<li class="list-group-item text-danger">加载失败，请重试</li>';
                });
        }

        // 加入聊天室
        function joinRoom(room) {
            currentRoomId = room.id;
            currentRoomName.textContent = room.note || room.name;
            
            // 清空消息区域
            chatMessages.innerHTML = '<div class="text-center text-muted my-3"><p>加载中...</p></div>';
            
            // 加入Socket.IO房间
            socket.emit('joinRoom', currentRoomId);
            
            // 加载历史消息
            loadHistoryMessages();
        }

        // 监听滚动事件，加载历史消息
        chatMessages.addEventListener('scroll', () => {
            if (chatMessages.scrollTop < 50 && hasMoreHistory) {
                loadHistoryMessages(true);
            }
        });

        // 加载历史消息
        function loadHistoryMessages(append = false) {
            if (loadingHistory || !currentRoomId || !hasMoreHistory) return;
            
            setLoadingHistory(true);
            
            const lastMessageId = append ? 
                document.querySelector('.message')?.dataset.messageId : 
                null;
            
            fetch(`/api/messages?roomId=${currentRoomId}${lastMessageId ? `&beforeId=${lastMessageId}` : ''}`)
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(messages => {
                    if (messages.length === 0) {
                        hasMoreHistory = false;
                        return;
                    }
                    
                    messages.forEach(message => {
                        if (append) {
                            addMessageToChat(message, 'prepend');
                        } else {
                            addMessageToChat(message);
                        }
                    });
                    
                    // 如果加载的消息少于20条，说明没有更多历史消息
                    if (messages.length < 20) {
                        hasMoreHistory = false;
                    }
                })
                .catch(error => {
                    console.error('加载历史消息失败:', error);
                    showError('加载历史消息失败：' + error.message);
                })
                .finally(() => {
                    setLoadingHistory(false);
                });
        }

        // 添加消息到聊天界面
        function addMessageToChat(message, position = 'append') {
            if (message.isDeleted) return;

            const isCurrentUser = message.senderId === currentUser.id;
            const now = new Date();
            const messageTime = new Date(message.sentAt || message.createdAt);
            const minutesDiff = Math.floor((now - messageTime) / 60000);
            
            const messageElement = document.createElement('div');
            messageElement.className = `message ${isCurrentUser ? 'message-right current-user' : 'message-left'}`;
            messageElement.dataset.messageId = message.id;
            
            messageElement.innerHTML = `
                <img src="${message.avatarUrl || 'https://via.placeholder.com/40'}" alt="头像" class="avatar me-2">
                <div class="message-content">
                    <div class="small text-muted">${message.nickname}</div>
                    <div class="message-bubble ${message.type !== 'text' ? 'message-' + message.type : 'message-text'}">
                        ${message.type === 'text' ? message.content :
                          message.type === 'image' ? `<img src="${message.fileUrl}" alt="图片" class="message-image">` :
                          message.type === 'video' ? `<video controls class="message-video"><source src="${message.fileUrl}" type="video/mp4"></video>` :
                          `<div class="message-file">
                              <i class="fas fa-file"></i> ${message.content}
                              <a href="${message.fileUrl}" class="d-block mt-1" target="_blank">点击下载</a>
                           </div>`}
                    </div>
                    <div class="message-time">${formatTime(message.sentAt || message.createdAt)}</div>
                </div>
            `;
            
            // 添加撤回按钮（仅对自己在10分钟内发送的消息显示）
            if (isCurrentUser && !message.isDeleted && minutesDiff < 10) {
                const retractBtn = document.createElement('button');
                retractBtn.className = 'btn btn-sm btn-link p-0 ms-2 text-danger retract-btn';
                retractBtn.title = '撤回';
                retractBtn.innerHTML = '<i class="fas fa-undo"></i>';
                retractBtn.addEventListener('click', () => retractMessage(message.id));
                
                // 将撤回按钮添加到消息时间后面
                const timeElement = messageElement.querySelector('.message-time');
                if (timeElement) {
                    timeElement.appendChild(retractBtn);
                }
            }
            
            if (position === 'prepend') {
                chatMessages.insertBefore(messageElement, chatMessages.firstChild);
            } else {
                chatMessages.appendChild(messageElement);
            }
            
            // 自动滚动到底部
            if (position !== 'prepend') {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // 发送消息
        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !currentRoomId) return;
            
            // 立即显示本地消息
            const localMessage = {
                id: Date.now(),
                senderId: currentUser.id,
                nickname: currentUser.nickname,
                avatarUrl: currentUser.avatarUrl,
                content: content,
                type: 'text',
                sentAt: new Date().toISOString(),
                isDeleted: false
            };
            addMessageToChat(localMessage);
            
            // 清空输入框
            messageInput.value = '';
            
            // 发送到服务器
            fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    roomId: currentRoomId,
                    content: content,
                    type: 'text'
                })
            })
            .catch(error => {
                console.error('发送消息失败:', error);
                showError('发送失败，请检查网络连接');
            });
        }

        // 撤回消息
        function retractMessage(messageId) {
            if (!confirm('确定要撤回这条消息吗？')) return;
            
            fetch(`/api/messages/${messageId}/retract`, {
                method: 'PUT'
            })
            .then(response => {
                if (!response.ok) throw new Error('撤回失败');
                return response.json();
            })
            .then(updatedMessage => {
                // 更新UI
                const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
                if (messageElement) {
                    const bubble = messageElement.querySelector('.bubble');
                    bubble.innerHTML = '<em class="text-muted">[已撤回]</em>';
                    messageElement.querySelector('.retract-btn')?.remove();
                }
                showSuccess('消息已撤回');
            })
            .catch(error => {
                showError('撤回失败：' + error.message);
            });
        }

        // 触发文件上传
        function triggerFileUpload(type) {
            const input = document.createElement('input');
            input.type = 'file';
            
            if (type === 'image') {
                input.accept = 'image/*';
            } else if (type === 'video') {
                input.accept = 'video/*';
            }
            // file类型接受所有文件
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('roomId', currentRoomId);
                formData.append('type', type);
                
                try {
                    const response = await fetch('/api/messages/file', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.message || '上传失败');
                    }
                    
                    const message = await response.json();
                    addMessageToChat(message);
                    
                } catch (error) {
                    showError('文件上传失败：' + error.message);
                }
            };
            
            input.click();
        }

        // 创建聊天室
        async function createRoom(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const roomData = {
                name: formData.get('name'),
                requireApproval: formData.get('requireApproval') === 'on',
                allowImages: formData.get('allowImages') === 'on',
                allowVideos: formData.get('allowVideos') === 'on',
                allowFiles: formData.get('allowFiles') === 'on'
            };
            
            try {
                const response = await fetch('/api/rooms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(roomData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '创建失败');
                }
                
                const newRoom = await response.json();
                showSuccess(`聊天室 ${newRoom.name} 创建成功！`);
                
                // 关闭模态框
                bootstrap.Modal.getInstance(document.getElementById('createRoomModal')).hide();
                
                // 刷新聊天室列表
                loadRooms();
                
            } catch (error) {
                showError('创建聊天室失败：' + error.message);
            }
        }

        // 搜索用户
        function searchUser() {
            const query = document.getElementById('searchUserInput').value.trim();
            if (!query) return;
            
            fetch(`/api/users/search?query=${encodeURIComponent(query)}`)
                .then(response => {
                    if (!response.ok) throw new Error('搜索失败');
                    return response.json();
                })
                .then(users => {
                    const resultsList = document.getElementById('searchResults');
                    resultsList.innerHTML = '';
                    
                    if (users.length === 0) {
                        resultsList.innerHTML = '<li class="list-group-item text-center text-muted">未找到用户</li>';
                        return;
                    }
                    
                    users.forEach(user => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.innerHTML = `
                            <div>
                                <strong>${user.nickname}</strong>
                                <small class="text-muted ms-2">@${user.username}</small>
                            </div>
                            <button class="btn btn-sm btn-primary start-private-chat" data-user-id="${user.id}" data-nickname="${user.nickname}">私聊</button>
                        `;
                        li.querySelector('.start-private-chat').addEventListener('click', () => startPrivateChat(user));
                        resultsList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('搜索用户失败:', error);
                    showError('搜索失败，请重试');
                });
        }

        // 开始私聊
        function startPrivateChat(user) {
            fetch('/api/rooms/private', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetUserId: user.id })
            })
            .then(response => {
                if (!response.ok) throw new Error('创建私聊失败');
                return response.json();
            })
            .then(room => {
                joinRoom(room);
                
                // 关闭模态框
                bootstrap.Modal.getInstance(document.getElementById('searchUserModal')).hide();
            })
            .catch(error => {
                showError('无法创建私聊：' + error.message);
            });
        }

        // 显示成员列表
        function showMembers() {
            if (!currentRoomId) return;
            
            fetch(`/api/rooms/${currentRoomId}/members`)
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(members => {
                    const membersList = document.getElementById('membersList');
                    membersList.innerHTML = '';
                    
                    members.forEach(member => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.innerHTML = `
                            <div class="d-flex align-items-center">
                                <img src="${member.avatarUrl}" alt="头像" class="avatar me-2">
                                <div>
                                    <div>${member.nickname}</div>
                                    <small class="text-muted">${member.isModerator ? '管理员' : '成员'}</small>
                                </div>
                            </div>
                            ${member.id !== currentUser.id ? 
                                `<div class="btn-group">
                                    <button class="btn btn-sm btn-outline-primary" title="私聊"><i class="fas fa-comment-dots"></i></button>
                                    ${currentRoomId !== 1 ? 
                                        `<button class="btn btn-sm btn-outline-danger kick-btn" data-user-id="${member.id}" title="踢出"><i class="fas fa-user-slash"></i></button>` : ''
                                    }
                                </div>` : ''}
                        `;
                        
                        if (li.querySelector('.kick-btn')) {
                            li.querySelector('.kick-btn').addEventListener('click', (e) => {
                                const userId = e.target.closest('.kick-btn').dataset.userId;
                                kickUser(userId);
                            });
                        }
                        
                        membersList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('加载成员列表失败:', error);
                    showError('加载成员失败，请重试');
                });
            
            // 显示模态框
            new bootstrap.Modal(document.getElementById('membersModal')).show();
        }

        // 踢出用户
        function kickUser(userId) {
            if (!currentRoomId || currentRoomId === 1) return;
            
            if (!confirm('确定要将该用户踢出聊天室吗？')) return;
            
            fetch(`/api/rooms/${currentRoomId}/members/${userId}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) throw new Error('踢出失败');
                showSuccess('用户已踢出');
                // 刷新成员列表
                if (document.getElementById('membersModal').classList.contains('show')) {
                    showMembers();
                }
            })
            .catch(error => {
                showError('踢出用户失败：' + error.message);
            });
        }

        // 标记为已读
        function markAsRead() {
            if (!currentRoomId) return;
            
            const messages = Array.from(chatMessages.querySelectorAll('.message'));
            if (messages.length === 0) return;
            
            // 获取最后一条消息的ID
            const lastMessageId = messages[messages.length - 1]
                .dataset.messageId || Date.now();
            
            fetch('/api/rooms/mark-read', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: currentRoomId, messageId: lastMessageId })
            }).catch(console.error);
        }

        // 格式化时间显示
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000 && date.getDate() === now.getDate()) return `${Math.floor(diff / 3600000)}小时前`;
            
            return date.toLocaleString();
        }

        // 显示成功消息
        function showSuccess(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-success fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        // 显示错误消息
        function showError(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-danger fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // 监听Socket.IO事件
        socket.on('receiveMessage', (message) => {
            if (message.roomId === currentRoomId) {
                addMessageToChat(message);
                
                // 自动标记为已读
                markAsRead();
            } else {
                // 更新未读数
                const roomItem = document.querySelector(`[data-room-id="${message.roomId}"]`);
                if (roomItem) {
                    const badge = roomItem.querySelector('.badge');
                    if (badge) {
                        const currentUnread = parseInt(badge.textContent) || 0;
                        badge.textContent = currentUnread + 1;
                        badge.style.display = 'inline';
                    }
                }
            }
        });
        
        // 监听消息撤回事件
        socket.on('messageRetracted', (data) => {
            const { messageId, roomId, retractedBy } = data;
            
            // 更新当前聊天室中的消息
            if (roomId === currentRoomId) {
                const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
                if (messageElement) {
                    // 找到消息气泡并更新内容
                    const bubble = messageElement.querySelector('.message-bubble');
                    if (bubble) {
                        bubble.innerHTML = '<em class="text-muted">[已撤回]</em>';
                        bubble.style.fontStyle = 'italic';
                    }
                    
                    // 移除撤回按钮
                    const retractBtn = messageElement.querySelector('.retract-btn');
                    if (retractBtn) {
                        retractBtn.remove();
                    }
                }
            }
        });
    </script>
</body>
</html>
