<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统状态 - VentiChat</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .status-card {
            transition: transform 0.2s;
        }
        .status-card:hover {
            transform: translateY(-5px);
        }
        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .metric-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .chart-container {
            height: 700px;
        }
        .metric-icon {
            font-size: 3rem !important;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-4">
                    <i class="bi bi-activity me-2"></i>系统状态监控
                </h1>
                <!-- 添加红色横幅提示 -->
                <div id="monitorWarningBanner" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    资源监控当前未运行，可能是被服务器管理员关闭，系统状态信息可能不准确或不可用。
                </div>
            </div>
        </div>

        <!-- 状态概览卡片 -->
        <div class="row g-4 mb-4" id="statusCards">
            <!-- CPU 使用率 -->
            <div class="col-md-6 col-lg-3">
                <div class="card status-card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <i class="bi bi-cpu-fill text-primary metric-icon"></i>
                        </div>
                        <div class="metric-value" id="cpuValue">--</div>
                        <div class="metric-label">CPU 使用率</div>
                        <div class="progress mt-2" style="height: 10px;">
                            <div class="progress-bar" id="cpuProgress" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 内存使用率 -->
            <div class="col-md-6 col-lg-3">
                <div class="card status-card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <i class="bi bi-memory text-success metric-icon"></i>
                        </div>
                        <div class="metric-value" id="memoryValue">--</div>
                        <div class="metric-label">内存使用率</div>
                        <div class="progress mt-2" style="height: 10px;">
                            <div class="progress-bar" id="memoryProgress" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 在线用户数 -->
            <div class="col-md-6 col-lg-3">
                <div class="card status-card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <i class="bi bi-people-fill text-info metric-icon"></i>
                        </div>
                        <div class="metric-value" id="onlineUsersValue">--</div>
                        <div class="metric-label">在线用户数</div>
                    </div>
                </div>
            </div>

            <!-- 网络流量 -->
            <div class="col-md-6 col-lg-3">
                <div class="card status-card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <i class="bi bi-arrow-down-up text-warning metric-icon"></i>
                        </div>
                        <div class="metric-value" id="networkValue">--</div>
                        <div class="metric-label">网络流量</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="row g-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>资源使用趋势</span>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" id="periodDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                最近1小时
                            </button>
                            <ul class="dropdown-menu" aria-labelledby="periodDropdown">
                                <li><a class="dropdown-item" href="#" data-period="30">最近30分钟</a></li>
                                <li><a class="dropdown-item" href="#" data-period="60">最近1小时</a></li>
                                <li><a class="dropdown-item" href="#" data-period="180">最近3小时</a></li>
                                <li><a class="dropdown-item" href="#" data-period="720">最近12小时</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="resourceChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 系统信息 -->
        <div class="row g-4 mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        说明
                    </div>
                    <div class="card-body">
                        <p class="mb-1">
                            <i class="bi bi-info-circle me-2"></i>此页面显示服务器实时状态信息
                        </p>
                        <p class="mb-1">
                            <i class="bi bi-info-circle me-2"></i>由于某些原因，网络和磁盘的数据可能无法获取，永远为0
                        </p>
                        <p class="mb-0">
                            <i class="bi bi-clock-history me-2"></i>数据每5秒更新一次
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resourceChart = null;
        let updateInterval = null;
        let selectedPeriod = 60; // 默认显示最近1小时

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            loadData();
            loadHistoryData(); // 初始化时加载历史数据填充图表
            
            // 设置定时更新
            updateInterval = setInterval(loadData, 5000);
            
            // 绑定周期选择事件
            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    selectedPeriod = parseInt(this.getAttribute('data-period'));
                    document.getElementById('periodDropdown').textContent = this.textContent;
                    loadHistoryData();
                });
            });
        });

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('resourceChart').getContext('2d');
            resourceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU 使用率 (%)',
                            data: [],
                            borderColor: 'rgb(255, 99, 132)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: '内存使用率 (%)',
                            data: [],
                            borderColor: 'rgb(54, 162, 235)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: '网络接收 (KB/s)',
                            data: [],
                            borderColor: 'rgb(75, 192, 192)',
                            backgroundColor: 'rgba(75, 192, 192, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y1'
                        },
                        {
                            label: '网络发送 (KB/s)',
                            data: [],
                            borderColor: 'rgb(153, 102, 255)',
                            backgroundColor: 'rgba(153, 102, 255, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: '时间'
                            }
                        },
                        y: {
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '使用率 (%)'
                            },
                            min: 0,
                            max: 100
                        },
                        y1: {
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '网络 (KB/s)'
                            },
                            min: 0,
                            grid: {
                                drawOnChartArea: false,
                            },
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        }
                    }
                }
            });
        }

        // 加载实时数据
        async function loadData() {
            try {
                const response = await fetch('/api/public/system/metrics');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    
                    // 检查监控是否启用
                    if (!data.monitoringEnabled) {
                        // 显示红色横幅
                        document.getElementById('monitorWarningBanner').classList.remove('d-none');

                        document.getElementById('cpuValue').textContent = '--';
                        document.getElementById('memoryValue').textContent = '--';
                        document.getElementById('onlineUsersValue').textContent = '--';
                        document.getElementById('networkValue').textContent = '--';
                        return;
                    }
                    
                    // 隐藏红色横幅
                    document.getElementById('monitorWarningBanner').classList.add('d-none');

                    // 更新各项指标
                    document.getElementById('cpuValue').textContent = data.cpu.toFixed(1) + '%';
                    document.getElementById('memoryValue').textContent = data.memory.toFixed(1) + '%';
                    document.getElementById('onlineUsersValue').textContent = data.onlineUsers || 0;
                    document.getElementById('networkValue').textContent = 
                        `↓${data.network.received.toFixed(1)} ↑${data.network.transmitted.toFixed(1)} KB/s`;
                    
                    // 更新进度条
                    document.getElementById('cpuProgress').style.width = data.cpu + '%';
                    document.getElementById('memoryProgress').style.width = data.memory + '%';
                    
                    // 根据数值设置进度条颜色
                    const cpuProgress = document.getElementById('cpuProgress');
                    if (data.cpu > 80) {
                        cpuProgress.className = 'progress-bar bg-danger';
                    } else if (data.cpu > 60) {
                        cpuProgress.className = 'progress-bar bg-warning';
                    } else {
                        cpuProgress.className = 'progress-bar bg-success';
                    }
                    
                    const memoryProgress = document.getElementById('memoryProgress');
                    if (data.memory > 80) {
                        memoryProgress.className = 'progress-bar bg-danger';
                    } else if (data.memory > 60) {
                        memoryProgress.className = 'progress-bar bg-warning';
                    } else {
                        memoryProgress.className = 'progress-bar bg-success';
                    }

                    // 绘制图表
                    loadHistoryData();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('serverStatus').innerHTML = '<span class="badge bg-danger">无法连接</span>';
            }
        }

        // 加载历史数据
        async function loadHistoryData() {
            try {
                const response = await fetch('/api/public/system/metrics/history');
                const result = await response.json();
                
                if (result.success) {
                    const historyData = result.data;
                    
                    // 计算时间范围
                    const now = new Date();
                    const timeAgo = new Date(now.getTime() - selectedPeriod * 60 * 1000);
                    
                    // 过滤指定时间范围内的数据
                    const filteredData = historyData.filter(point => new Date(point.timestamp) >= timeAgo);
                    
                    // 准备图表数据
                    const labels = filteredData.map(point => {
                        const date = new Date(point.timestamp);
                        return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                    });
                    
                    const cpuData = filteredData.map(point => point.cpu);
                    const memoryData = filteredData.map(point => point.memory);
                    const networkReceivedData = filteredData.map(point => point.network.received);
                    const networkTransmittedData = filteredData.map(point => point.network.transmitted);
                    
                    // 更新图表
                    resourceChart.data.labels = labels;
                    resourceChart.data.datasets[0].data = cpuData;
                    resourceChart.data.datasets[1].data = memoryData;
                    resourceChart.data.datasets[2].data = networkReceivedData;
                    resourceChart.data.datasets[3].data = networkTransmittedData;
                    resourceChart.update();
                }
            } catch (error) {
                console.error('加载历史数据失败:', error);
            }
        }
    </script>
</body>
</html>
