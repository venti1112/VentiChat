<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - VentiChat</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/register.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/js/bootstrap.min.js" defer></script>
    <script src="/js/common.js" defer></script>
    <script src="/js/register.js" defer></script>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success global-message">
        操作成功！
    </div>

    <div class="container">
        <div class="register-container">
            <div class="register-header">
                <h2><i class="bi bi-chat-left-text me-2"></i>VentiChat</h2>
                <p class="mb-0">创建新账号</p>
            </div>
            <div class="register-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="20">
                        </div>
                        <small class="text-muted">3-20个字符，只能包含字母、数字和下划线</small>
                    </div>
                    <div class="mb-3">
                        <label for="nickname" class="form-label">昵称</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-badge"></i></span>
                            <input type="text" class="form-control" id="nickname" name="nickname" required maxlength="20">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        </div>
                        <small class="text-muted">至少6位字符</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-register w-100">
                        <i class="bi bi-person-plus me-2"></i>注册
                    </button>
                </form>
                <div class="login-link">
                    已有账号？<a href="/login.html">立即登录</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
