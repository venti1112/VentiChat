<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - VentiChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .register-header {
            background: #0b93f6;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .register-body {
            padding: 30px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .btn-register {
            background: #0b93f6;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        /* 全局消息提示 */
        .global-message {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            width: 300px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success global-message">
        操作成功！
    </div>

    <div class="container">
        <div class="register-container mx-auto">
            <div class="register-header">
                <h2><i class="fas fa-comments me-2"></i>VentiChat</h2>
                <p class="mb-0">创建新账号</p>
            </div>
            <div class="register-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="20">
                        </div>
                        <small class="text-muted">3-20个字符，只能包含字母、数字和下划线</small>
                    </div>
                    <div class="mb-3">
                        <label for="nickname" class="form-label">昵称</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                            <input type="text" class="form-control" id="nickname" name="nickname" required maxlength="20">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        </div>
                        <small class="text-muted">至少6位字符</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-register w-100">
                        <i class="fas fa-user-plus me-2"></i>注册
                    </button>
                </form>
                <div class="login-link">
                    已有账号？<a href="/login.html">立即登录</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 全局消息处理 -->
    <script>
        // 显示成功消息
        function showSuccess(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-success global-message';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        // 显示错误消息
        function showError(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-danger global-message';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // 处理注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = {
                username: formData.get('username'),
                nickname: formData.get('nickname'),
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword')
            };
            
            // 前端验证
            if (userData.password !== userData.confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(userData.username)) {
                showError('用户名格式不正确');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '注册失败');
                }
                
                const result = await response.json();
                showSuccess('注册成功！请登录');
                
                // 重定向到登录页
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
                
            } catch (error) {
                showError('注册失败：' + error.message);
            }
        });
    </script>
</body>
</html>
