<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - VentiChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { padding-top: 56px; }
        .admin-container { max-width: 1200px; margin: 20px auto; }
        .nav-pills .nav-link.active {
            background-color: #0b93f6;
        }
        .status-badge {
            font-size: 0.8em;
            padding: 0.25em 0.6em;
        }
        .status-active {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .status-banned {
            background-color: #f8d7da;
            color: #842029;
        }
        .table th {
            font-weight: bold;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <!-- 全局消息提示 -->
    <div id="globalMessage" class="alert alert-success fixed-top text-center" style="display: none;">
        操作成功！
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">VentiChat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">聊天</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">管理后台</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-light" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4><i class="fas fa-cogs me-2"></i>管理后台</h4>
                        <span class="badge bg-light text-dark">管理员权限</span>
                    </div>
                    
                    <!-- 导航选项卡 -->
                    <div class="card-body">
                        <ul class="nav nav-pills mb-4" id="adminTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="users-tab" data-bs-toggle="pill" data-bs-target="#users" type="button" role="tab">用户管理</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="rooms-tab" data-bs-toggle="pill" data-bs-target="#rooms" type="button" role="tab">聊天室管理</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="settings-tab" data-bs-toggle="pill" data-bs-target="#settings" type="button" role="tab">系统设置</button>
                            </li>
                        </ul>

                        <!-- 内容区域 -->
                        <div class="tab-content" id="adminTabContent">
                            <!-- 用户管理 -->
                            <div class="tab-pane fade show active" id="users" role="tabpanel">
                                <div class="d-flex justify-content-between mb-3">
                                    <h5><i class="fas fa-users me-2"></i>用户管理</h5>
                                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addUserModal"><i class="fas fa-plus me-1"></i>添加用户</button>
                                </div>
                                
                                <!-- 搜索框 -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" placeholder="搜索用户（UID/用户名/昵称）" id="searchUsers">
                                    </div>
                                    <div class="col-md-6">
                                        <select class="form-select" id="filterStatus">
                                            <option value="">所有状态</option>
                                            <option value="active">正常</option>
                                            <option value="banned">封禁</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <!-- 用户表格 -->
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th>UID</th>
                                                <th>用户名</th>
                                                <th>昵称</th>
                                                <th>头像</th>
                                                <th>状态</th>
                                                <th>注册时间</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="usersTableBody">
                                            <!-- 用户数据将通过JavaScript动态生成 -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- 聊天室管理 -->
                            <div class="tab-pane fade" id="rooms" role="tabpanel">
                                <div class="d-flex justify-content-between mb-3">
                                    <h5><i class="fas fa-comments me-2"></i>聊天室管理</h5>
                                    <button class="btn btn-danger" id="cleanupRoomsBtn"><i class="fas fa-trash-alt me-1"></i>清理异常聊天室</button>
                                </div>
                                
                                <!-- 搜索框 -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control" placeholder="搜索聊天室（RID/名称）" id="searchRooms">
                                    </div>
                                    <div class="col-md-6">
                                        <select class="form-select" id="filterRoomType">
                                            <option value="">所有类型</option>
                                            <option value="normal">普通聊天室</option>
                                            <option value="private">私聊</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <!-- 聊天室表格 -->
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th>RID</th>
                                                <th>名称</th>
                                                <th>创建者</th>
                                                <th>成员数</th>
                                                <th>创建时间</th>
                                                <th>保存期限</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="roomsTableBody">
                                            <!-- 聊天室数据将通过JavaScript动态生成 -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- 系统设置 -->
                            <div class="tab-pane fade" id="settings" role="tabpanel">
                                <h5><i class="fas fa-sliders-h me-2"></i>系统设置</h5>
                                
                                <form id="settingsForm" class="mt-4">
                                    <div class="card">
                                        <div class="card-header bg-secondary text-white">
                                            <h6 class="mb-0">消息保存设置</h6>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label for="retentionDays" class="form-label">消息、图片、视频、文件保存期限（天）</label>
                                                <input type="number" class="form-control" id="retentionDays" name="retentionDays" min="1" max="3650" required>
                                                <div class="form-text">默认180天，每天凌晨4点自动清理过期内容</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="card mt-4">
                                        <div class="card-header bg-secondary text-white">
                                            <h6 class="mb-0">服务器信息</h6>
                                        </div>
                                        <div class="card-body">
                                            <div class="row">
                                                <div class="col-md-6">
                                                    <div class="mb-3">
                                                        <label class="form-label">服务器地址</label>
                                                        <input type="text" class="form-control" value="http://localhost:3000" readonly>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="mb-3">
                                                        <label class="form-label">当前版本</label>
                                                        <input type="text" class="form-control" value="1.0.0" readonly>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-md-6">
                                                    <div class="mb-3">
                                                        <label class="form-label">数据库状态</label>
                                                        <div class="d-flex align-items-center">
                                                            <div class="spinner-border spinner-border-sm text-success me-2" role="status">
                                                                <span class="visually-hidden">加载中...</span>
                                                            </div>
                                                            <span>连接正常</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="mb-3">
                                                        <label class="form-label">在线用户</label>
                                                        <span class="badge bg-primary">152</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                        <button type="button" class="btn btn-secondary" id="resetSettingsBtn">重置</button>
                                        <button type="submit" class="btn btn-primary">保存设置</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加用户模态框 -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>添加用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" name="username" required>
                            <div class="form-text">用于登录的账号</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">昵称</label>
                            <input type="text" class="form-control" name="nickname" required>
                            <div class="form-text">在聊天中显示的名字</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" name="password" required minlength="6">
                            <div class="form-text">至少6位字符</div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="isAdmin" id="isAdmin">
                            <label class="form-check-label" for="isAdmin">设为管理员</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary" form="addUserForm">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑用户模态框 -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-edit me-2"></i>编辑用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm">
                        <input type="hidden" name="userId" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" name="username" id="editUsername" disabled>
                            <div class="form-text">用于登录的账号，不可更改</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">昵称</label>
                            <input type="text" class="form-control" name="nickname" id="editNickname" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" name="newPassword" id="editNewPassword" minlength="6">
                            <div class="form-text">留空则不修改密码</div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="isAdmin" id="editIsAdmin">
                            <label class="form-check-label" for="editIsAdmin">管理员权限</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">账户状态</label>
                            <select class="form-select" name="status" id="editStatus">
                                <option value="active">正常</option>
                                <option value="banned">封禁</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary" form="editUserForm">保存更改</button>
                </div>
            </div>
        </div>
    </div>


    <!-- 成功提示模态框 -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-check-circle me-2"></i>成功</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="successMessage">操作成功完成！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误提示模态框 -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>错误</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="errorMessage">发生错误，请重试。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 主要应用脚本 -->
    <script>
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const currentUser = localStorage.getItem('currentUser');
            
            if (!token || !currentUser) {
                window.location.href = '/login.html';
                return false;
            }
            
            try {
                // 验证token有效性（简单检查）
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('currentUser');
                    window.location.href = '/login.html';
                    return false;
                }
                
                // 检查管理员权限
                const user = JSON.parse(currentUser);
                if (!user.isAdmin) {
                    alert('您没有访问管理后台的权限');
                    window.location.href = '/';
                    return false;
                }
                
                return true;
            } catch (e) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                window.location.href = '/login.html';
                return false;
            }
        }
        
        // 全局变量
        let currentUserId = null;
        let currentUserData = null;
        
        // DOM元素引用
        const usersTableBody = document.getElementById('usersTableBody');
        const roomsTableBody = document.getElementById('roomsTableBody');
        
        // 状态变量
        let loadingUsers = false;
        let loadingRooms = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            // 从localStorage获取当前用户信息
            currentUserData = JSON.parse(localStorage.getItem('currentUser'));
            currentUserId = currentUserData.id;
            
            loadUsers();
            loadRooms();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 表单提交
            document.getElementById('settingsForm').addEventListener('submit', updateSettings);
            document.getElementById('addUserForm').addEventListener('submit', addUser);
            document.getElementById('editUserForm').addEventListener('submit', editUser);
            
            // 按钮点击
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('cleanupRoomsBtn').addEventListener('click', cleanupRooms);
            document.getElementById('resetSettingsBtn').addEventListener('click', resetSettings);
            
            // 搜索功能
            document.getElementById('searchUsers').addEventListener('input', filterUsers);
            document.getElementById('filterStatus').addEventListener('change', filterUsers);
            document.getElementById('searchRooms').addEventListener('input', filterRooms);
            document.getElementById('filterRoomType').addEventListener('change', filterRooms);
            
            // 解散聊天室确认
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDeleteRoom);
        }

        // 加载管理数据
        async function loadAdminData() {
            try {
                // 加载用户列表
                loadUsers();
                
                // 加载聊天室列表
                loadRooms();
                
                // 加载系统设置
                loadSettings();
                
            } catch (error) {
                showError('加载管理数据失败：' + error.message);
            }
        }

        // 加载用户列表
        function loadUsers() {
            fetch('/api/admin/users')
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(users => {
                    const tbody = document.getElementById('usersTableBody');
                    tbody.innerHTML = '';
                    
                    users.forEach(user => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.nickname}</td>
                            <td><img src="${user.avatarUrl}" alt="头像" class="avatar" style="width: 30px; height: 30px;"></td>
                            <td>
                                <span class="badge ${user.status === 'active' ? 'status-active' : 'status-banned'}">
                                    ${user.status === 'active' ? '正常' : '封禁'}
                                </span>
                            </td>
                            <td>${formatDateTime(user.createdAt)}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn btn-sm btn-primary" onclick="openEditUserModal(${JSON.stringify(user)})" title="编辑"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm ${user.status === 'active' ? 'btn-warning' : 'btn-success'}" 
                                            onclick="toggleUserStatus(${user.id}, '${user.status}')" 
                                            title="${user.status === 'active' ? '封禁' : '解封'}">
                                        <i class="fas fa-${user.status === 'active' ? 'ban' : 'check'}"></i>
                                    </button>
                                    ${user.id !== 1 ? 
                                        `<button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})" title="删除"><i class="fas fa-trash-alt"></i></button>` : 
                                        '<button class="btn btn-sm btn-secondary" disabled title="系统管理员"><i class="fas fa-lock"></i></button>'
                                    }
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('加载用户列表失败:', error);
                    showError('加载用户列表失败：' + error.message);
                });
        }

        // 加载聊天室列表
        function loadRooms() {
            fetch('/api/admin/rooms')
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(rooms => {
                    const tbody = document.getElementById('roomsTableBody');
                    tbody.innerHTML = '';
                    
                    rooms.forEach(room => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${room.id}</td>
                            <td>${room.name}</td>
                            <td>${room.creator?.nickname || '未知'}</td>
                            <td>${room.memberCount}</td>
                            <td>${formatDateTime(room.createdAt)}</td>
                            <td>${room.retentionDays} 天</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn btn-sm btn-info" onclick="viewRoomDetails(${room.id})" title="查看详情"><i class="fas fa-info-circle"></i></button>
                                    ${room.id !== 1 ? 
                                        `<button class="btn btn-sm btn-danger" onclick="deleteRoom(${room.id}, '${room.name.replace(/'/g, "\\'")}')" title="解散"><i class="fas fa-trash-alt"></i></button>` : 
                                        '<button class="btn btn-sm btn-secondary" disabled title="默认聊天室"><i class="fas fa-lock"></i></button>'
                                    }
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('加载聊天室列表失败:', error);
                    showError('加载聊天室列表失败：' + error.message);
                });
        }

        // 加载系统设置
        function loadSettings() {
            // 这里应该从服务器获取系统设置
            // 现在用模拟数据
            document.getElementById('retentionDays').value = 180;
        }

        // 更新系统设置
        async function updateSettings(e) {
            e.preventDefault();
            
            const retentionDays = parseInt(document.getElementById('retentionDays').value);
            
            if (retentionDays < 1 || retentionDays > 3650) {
                showError('保存期限必须在1-3650天之间');
                return;
            }
            
            try {
                // 这里应该发送请求到服务器更新设置
                console.log('更新系统设置:', { retentionDays });
                
                // 模拟成功响应
                showSuccess('系统设置更新成功！');
                
            } catch (error) {
                showError('更新设置失败：' + error.message);
            }
        }

        // 添加用户
        async function addUser(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = {
                username: formData.get('username'),
                nickname: formData.get('nickname'),
                password: formData.get('password'),
                isAdmin: formData.get('isAdmin') === 'on'
            };
            
            // 验证输入
            if (!userData.username || !userData.nickname || !userData.password) {
                showError('请填写所有必填字段');
                return;
            }
            
            if (userData.password.length < 6) {
                showError('密码至少需要6位字符');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '添加失败');
                }
                
                const newUser = await response.json();
                showSuccess(`用户 ${newUser.username} 添加成功！`);
                
                // 关闭模态框
                bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                
                // 刷新用户列表
                loadUsers();
                
            } catch (error) {
                showError('添加用户失败：' + error.message);
            }
        }

        // 编辑用户
        async function editUser(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userId = formData.get('userId');
            const userData = {
                nickname: formData.get('nickname'),
                newPassword: formData.get('newPassword') || undefined,
                isAdmin: formData.get('isAdmin') === 'on',
                status: formData.get('status')
            };
            
            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '更新失败');
                }
                
                showSuccess('用户信息更新成功！');
                
                // 关闭模态框
                bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                
                // 刷新用户列表
                loadUsers();
                
            } catch (error) {
                showError('更新用户失败：' + error.message);
            }
        }

        // 删除用户
        async function deleteUser(userId) {
            if (!confirm('确定要删除这个用户吗？此操作无法撤销！')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '删除失败');
                }
                
                showSuccess('用户删除成功！');
                
                // 刷新用户列表
                loadUsers();
                
            } catch (error) {
                showError('删除用户失败：' + error.message);
            }
        }

        // 切换用户状态（封禁/解封）
        async function toggleUserStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'banned' : 'active';
            const action = newStatus === 'banned' ? '封禁' : '解封';
            
            if (!confirm(`确定要${action}这个用户吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/users/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || `${action}失败`);
                }
                
                showSuccess(`用户已${action}！`);
                
                // 刷新用户列表
                loadUsers();
                
            } catch (error) {
                showError(`${action}失败：` + error.message);
            }
        }

        // 删除聊天室
        async function deleteRoom(roomId, roomName) {
            if (roomId === 1) {
                showError('默认大聊天室不能被解散');
                return;
            }
            
            if (!confirm(`确定要解散聊天室【${roomName}】吗？此操作无法撤销！`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/rooms/${roomId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '解散失败');
                }
                
                showSuccess('聊天室已解散！');
                
                // 刷新聊天室列表
                loadRooms();
                
            } catch (error) {
                showError('解散聊天室失败：' + error.message);
            }
        }

        // 查看聊天室详情
        function viewRoomDetails(roomId) {
            fetch(`/api/admin/rooms/${roomId}`)
                .then(response => {
                    if (!response.ok) throw new Error('加载失败');
                    return response.json();
                })
                .then(room => {
                    const modal = document.getElementById('roomDetailsModal');
                    
                    // 填充模态框内容
                    modal.querySelector('.room-name').textContent = room.name;
                    modal.querySelector('.room-id').textContent = room.id;
                    modal.querySelector('.room-creator').textContent = room.creator?.nickname || '未知';
                    modal.querySelector('.member-count').textContent = room.memberCount;
                    modal.querySelector('.message-count').textContent = room.messageCount;
                    modal.querySelector('.created-at').textContent = formatDateTime(room.createdAt);
                    modal.querySelector('.retention-days').textContent = `${room.retentionDays} 天`;
                    modal.querySelector('.join-policy').textContent = room.joinPolicy === 'approval' ? '需审批' : '自由加入';
                    
                    // 显示成员列表
                    const membersList = modal.querySelector('#roomMembersList');
                    membersList.innerHTML = '';
                    
                    if (room.members && room.members.length > 0) {
                        room.members.forEach(member => {
                            const li = document.createElement('li');
                            li.className = 'list-group-item d-flex justify-content-between align-items-center';
                            li.innerHTML = `
                                <div class="d-flex align-items-center">
                                    <img src="${member.avatarUrl}" alt="头像" class="avatar me-2">
                                    <div>
                                        <div>${member.nickname}</div>
                                        <small class="text-muted">${member.isModerator ? '管理员' : '成员'}</small>
                                    </div>
                                </div>
                                <span class="badge ${member.status === 'active' ? 'bg-success' : 'bg-warning'}">
                                    ${member.status === 'active' ? '在线' : '离线'}
                                </span>
                            `;
                            membersList.appendChild(li);
                        });
                    } else {
                        membersList.innerHTML = '<li class="list-group-item text-center text-muted">暂无成员</li>';
                    }
                    
                    // 显示模态框
                    new bootstrap.Modal(modal).show();
                })
                .catch(error => {
                    console.error('加载聊天室详情失败:', error);
                    showError('加载详情失败：' + error.message);
                });
        }

        // 清理异常聊天室
        async function cleanupRooms() {
            if (!confirm('确定要清理异常聊天室吗？这将删除没有成员或创建者的聊天室。')) {
                return;
            }
            
            try {
                // 这里应该发送请求到服务器清理异常聊天室
                console.log('清理异常聊天室');
                
                // 模拟成功响应
                showSuccess('异常聊天室清理完成！');
                
                // 刷新聊天室列表
                loadRooms();
                
            } catch (error) {
                showError('清理失败：' + error.message);
            }
        }

        // 重置设置表单
        function resetSettings() {
            loadSettings();
        }

        // 过滤用户
        function filterUsers() {
            const searchValue = document.getElementById('searchUsers').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            
            const rows = document.querySelectorAll('#usersTableBody tr');
            
            rows.forEach(row => {
                const username = row.cells[1].textContent.toLowerCase();
                const nickname = row.cells[2].textContent.toLowerCase();
                const uid = row.cells[0].textContent;
                const status = row.cells[4].querySelector('.badge').classList.contains('status-active') ? 'active' : 'banned';
                
                const matchesSearch = searchValue === '' || 
                                     username.includes(searchValue) || 
                                     nickname.includes(searchValue) || 
                                     uid.includes(searchValue);
                
                const matchesStatus = statusFilter === '' || status === statusFilter;
                
                row.style.display = matchesSearch && matchesStatus ? '' : 'none';
            });
        }

        // 过滤聊天室
        function filterRooms() {
            const searchValue = document.getElementById('searchRooms').value.toLowerCase();
            const typeFilter = document.getElementById('filterRoomType').value;
            
            const rows = document.querySelectorAll('#roomsTableBody tr');
            
            rows.forEach(row => {
                const name = row.cells[1].textContent.toLowerCase();
                const rid = row.cells[0].textContent;
                const isPrivate = row.querySelector('.btn-danger[title="解散"]') === null; // 私聊没有解散按钮
                
                const matchesSearch = searchValue === '' || 
                                     name.includes(searchValue) || 
                                     rid.includes(searchValue);
                
                const matchesType = typeFilter === '' || 
                                   (typeFilter === 'normal' && !isPrivate) || 
                                   (typeFilter === 'private' && isPrivate);
                
                row.style.display = matchesSearch && matchesType ? '' : 'none';
            });
        }

        // 格式化日期时间
        function formatDateTime(dateTimeStr) {
            const date = new Date(dateTimeStr);
            return date.toLocaleString();
        }

        // 显示成功消息
        function showSuccess(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-success fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        // 显示错误消息
        function showError(message) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = 'alert alert-danger fixed-top text-center';
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 这里应该清除会话并重定向到登录页
                console.log('管理员退出登录');
                // 实际实现中需要调用API
                window.location.href = '/';
            }
        }
    </script>
</body>
